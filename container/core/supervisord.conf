; TODO: 使用 supervisord 管理 Open5GS 多個 network function。
; 提示: 需要啟動 AMF、SMF、UPF、NRF、AUSF、UDM、UDR、PCF 等必要網元。
; 提示: stdout/stderr 建議輸出到 container log，方便 eval 與 debug。
[unix_http_server]
file=/var/run/supervisor.sock

[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:amfd]
command=/usr/bin/open5gs-amfd
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:smfd]
command=/usr/bin/open5gs-smfd
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
